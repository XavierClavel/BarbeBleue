name: Release Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    
permissions:
  contents: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkTag:
    uses: ./.github/workflows/_check_tag.yml
    with:
      platform: android
          
  buildForAndroidPlatform:
    name: Build For Android Platform
    runs-on: ubuntu-latest
    needs: checkTag
    if: needs.checkTag.outputs.exists == 'false'
    steps:
      - uses: jlumbroso/free-disk-space@v1.3.1
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android
      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          androidExportType: androidAppBundle
          androidKeystoreName: user # This file won't exist, but this property needs to exist.
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          androidTargetSdkVersion: AndroidApiLevel33
      - uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: build/Android

  releaseToGooglePlay:
    name: Release to the Google Play Store
    runs-on: ubuntu-latest
    needs: buildForAndroidPlatform
    env:
      GOOGLE_PLAY_KEY_FILE: ${{ secrets.GOOGLE_PLAY_KEY_FILE }}
      GOOGLE_PLAY_KEY_FILE_PATH: ${{ format('{0}/fastlane/google-fastlane.json', github.workspace) }}
      ANDROID_BUILD_FILE_PATH: ${{ format('{0}/build/Android/Android.aab', github.workspace) }}
      ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-android
          path: build/Android
      - name: Add Authentication
        run: echo "$GOOGLE_PLAY_KEY_FILE" > $GOOGLE_PLAY_KEY_FILE_PATH
      - name: Set up Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true
      - name: Upload to Google Play Internal
        uses: maierj/fastlane-action@v3.0.0
        with:
          lane: 'android internal' # Change to upload to a different lane
  
  createTag:
    needs: [ checkTag, releaseToGooglePlay ]
    uses: ./.github/workflows/_create_tag.yml
    with:
      tag: ${{ needs.checkTag.outputs.tag }}
  
  cleanup:
    needs: [ checkTag, releaseToGooglePlay ]
    if: ${{ always() && needs.checkTag.outputs.exists == 'false' }}
    uses: ./.github/workflows/_cleanup.yml
    with:
      platform: android