name: Release WebGL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkTag:
    uses: ./.github/workflows/_check_tag.yml
    with:
      platform: webGL
  
  
  buildForWebGLPlatform:
    name: Build for WebGL platform
    runs-on: ubuntu-latest
    needs: checkTag
    if: needs.checkTag.outputs.exists == 'false'

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Cache
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: WebGL

      # Upload
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-webGL
          path: build/WebGL/WebGL
  
  deployToCloudfare:
    name: Deploy to Cloudfare
    runs-on: ubuntu-latest
    needs: buildForWebGLPlatform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download WebGL Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-webGL
          path: build/WebGL/WebGL
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deployToItch:
    name: Deploy to itch.io
    runs-on: ubuntu-latest
    needs: buildForWebGLPlatform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download WebGL Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-webGL
          path: build/WebGL/WebGL
      - name: Deploy to itch.io
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.ITCH_API_KEY }}
          CHANNEL: html5
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          PACKAGE: build/WebGL/WebGL
  
  createTag:
    needs: [ checkTag, deployToCloudfare, deployToItch]
    uses: ./.github/workflows/_create_tag.yml
    with:
      tag: ${{ needs.checkTag.outputs.tag }}
  
  cleanup:
    needs: [ checkTag, deployToCloudfare, deployToItch ]
    if: ${{ always() && needs.checkTag.outputs.exists == 'false' }}
    uses: ./.github/workflows/_cleanup.yml
    with:
      platform: webGL