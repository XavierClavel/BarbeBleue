name: Release WebGL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkTag:
    name: Check for existing tag of same version
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.tagcheck.outputs.exists }}
      tag: ${{ steps.tagcheck.outputs.tag }}
      version: ${{ steps.tagcheck.outputs.version }}
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Determine version + tag, and whether that tag already exists
      - name: Check release tag
        id: tagcheck
        run: |
          VERSION=$(grep -m1 'bundleVersion:' ProjectSettings/ProjectSettings.asset | sed 's/.*bundleVersion:[[:space:]]*//' | tr -d '[:space:]')
          TAG="webGL-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${TAG} already exists — skipping build and deployment"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${TAG} does not exist — proceeding with build and deployment"
          fi
  
  
  buildForWebGLPlatform:
    name: Build for WebGL platform
    runs-on: ubuntu-latest
    needs: checkTag
    if: needs.checkTag.outputs.exists == 'false'

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Cache
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: WebGL

      # Upload
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-WebGL
          path: build/WebGL/WebGL
  
  deployToCloudfare:
    name: Deploy to Cloudfare
    runs-on: ubuntu-latest
    needs: buildForWebGLPlatform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download WebGL Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-WebGL
          path: build/WebGL/WebGL
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deployToItch:
    name: Deploy to itch.io
    runs-on: ubuntu-latest
    needs: buildForWebGLPlatform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download WebGL Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-WebGL
          path: build/WebGL/WebGL
      - name: Deploy to itch.io
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.ITCH_API_KEY }}
          CHANNEL: html5
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          PACKAGE: build/WebGL/WebGL
  
  createTag:
    name: Create tag
    runs-on: ubuntu-latest
    needs: [ checkTag, deployToCloudfare, deployToItch]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      # Tag the release once deployment succeeded
      - name: Create release tag
        env:
          TAG: ${{ needs.checkTag.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [ checkTag, deployToCloudfare, deployToItch ]
    if: ${{ always() && needs.checkTag.outputs.exists == 'false' }}
    steps:
      - name: Cleanup to avoid storage limit
        uses: geekyeggo/delete-artifact@v2
        with:
          name: build-WebGL
      