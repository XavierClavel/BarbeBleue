name: Release CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Determine version + tag, and whether that tag already exists
      - name: Check release tag
        id: tagcheck
        run: |
          VERSION=$(grep -m1 'bundleVersion:' ProjectSettings/ProjectSettings.asset | sed 's/.*bundleVersion:[[:space:]]*//' | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${TAG} already exists — skipping build and deployment"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${TAG} does not exist — proceeding with build and deployment"
          fi

      - name: Verify Cloudflare secrets present
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then                                                                                                                   
            echo "::error::CLOUDFLARE_API_TOKEN is empty — secret not set or misnamed"; exit 1                                                                                    
          fi                                                                                                                                                                      
          echo "Token is set (length: ${#TOKEN})"                                                                                                                                 
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Cache
      - name: Cache Library
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Build
      - name: Build project
        if: steps.tagcheck.outputs.exists == 'false'
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: WebGL

      # Upload
      - name: Upload build
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL/WebGL

      - name: Deploy to Cloudflare Workers
        if: steps.tagcheck.outputs.exists == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # itch.io
      - name: Deploy to itch.io
        if: steps.tagcheck.outputs.exists == 'false'
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.ITCH_API_KEY }}
          CHANNEL: html5
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          PACKAGE: build/WebGL/WebGL

      # Tag the release once deployment succeeded
      - name: Create release tag
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          TAG: ${{ steps.tagcheck.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"