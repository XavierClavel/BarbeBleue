name: Release CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Verify Cloudflare secrets present
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then                                                                                                                   
            echo "::error::CLOUDFLARE_API_TOKEN is empty — secret not set or misnamed"; exit 1                                                                                    
          fi                                                                                                                                                                      
          echo "Token is set (length: ${#TOKEN})"                                                                                                                                 
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Cache
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: WebGL

      # Upload
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL/WebGL

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/WebGL/WebGL --project-name=damp-silence-3729
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # itch.io
      - name: Deploy to itch.io
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.ITCH_API_KEY }}
          CHANNEL: html5
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          PACKAGE: build/WebGL/WebGL